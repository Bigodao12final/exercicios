<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Bhaskara</title>
  <link rel="stylesheet" href="baskara.css">
</head>

<body>

<header>
  Calculadora de Bhaskara
</header>

<div class="container">

  <h2>Digite os valores</h2>

  <label>A:</label>
  <input type="number" id="a"><br><br>

  <label>B:</label>
  <input type="number" id="b"><br><br>

  <label>C:</label>
  <input type="number" id="c"><br><br>

  <button onclick="calcular()">Calcular</button>

  <h3 id="resultado"></h3>

</div>

<footer>
  Desenvolvido por Renan 🚀
</footer>

<script>
  function calcular() {
    let a = parseFloat(document.getElementById("a").value);
    let b = parseFloat(document.getElementById("b").value);
    let c = parseFloat(document.getElementById("c").value);

    let delta = (b * b) - (4 * a * c);

    if (a === 0) {
      document.getElementById("resultado").innerText = "Não é equação do 2º grau!";
      return;
    }

    if (delta < 0) {
      document.getElementById("resultado").innerText = "Não existem raízes reais.";
    } else {
      let x1 = (-b + Math.sqrt(delta)) / (2 * a);
      let x2 = (-b - Math.sqrt(delta)) / (2 * a);

      function formatar(num) {
        return Number.isInteger(num) ? num : num.toFixed(2);
      }

      x1 = formatar(x1);
      x2 = formatar(x2);

      document.getElementById("resultado").innerText =
        "Δ = " + delta + " | x1 = " + x1 + " | x2 = " + x2;
    }
  }
</script>

</body>
</html>
