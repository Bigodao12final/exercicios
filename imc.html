<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculadora de IMC</title>
    <link rel="stylesheet" href="imc.css">
</head>
<body>

<header>
    <h1>Calculadora de IMC</h1>
</header>

<main>
    <section class="form-section">
        <h2>Digite seus dados</h2>

        <label for="peso">Peso (kg):</label>
        <input type="number" id="peso" placeholder="Ex: 70">

        <label for="altura">Altura (m):</label>
        <input type="number" id="altura" step="0.01" placeholder="Ex: 1.75">

        <button onclick="calcularIMC()">Calcular</button>

        <div id="mensagem"></div>
        <div id="resultado"></div>
    </section>

    <section class="tabela-section">
        <h2>Tabela de IMC</h2>
        <table>
            <tr>
                <th>IMC</th>
                <th>Classificação</th>
            </tr>
            <tr><td>< 18.5</td><td>Abaixo do peso</td></tr>
            <tr><td>18.5 - 24.9</td><td>Peso normal</td></tr>
            <tr><td>25.0 - 29.9</td><td>Sobrepeso</td></tr>
            <tr><td>30.0 - 34.9</td><td>Obesidade grau I</td></tr>
            <tr><td>35.0 - 39.9</td><td>Obesidade grau II</td></tr>
            <tr><td>>= 40.0</td><td>Obesidade grau III</td></tr>
        </table>
    </section>
</main>

<footer>
    <p>© 2026 - Projeto IMC</p>
</footer>

<script src="imc.js"></script>
</body>
</html>
